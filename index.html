<!DOCTYPE html>
<html>
<head>
  <title>Manhwa Free Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #2b2b2b;

      background: url('https://images.unsplash.com/photo-1520763185298-1b434c919102?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .overlay {
      background: rgba(255, 255, 255, 0.75);
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .header h1 {
      font-size: 48px;
      color: #7c3aed;
      margin: 0;
      letter-spacing: 2px;
    }

    .header p {
      font-size: 18px;
      margin-top: 10px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .intro {
      background: rgba(255,255,255,0.8);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    .intro h2 {
      margin-top: 0;
      color: #6d28d9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
