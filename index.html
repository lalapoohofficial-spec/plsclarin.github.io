<!DOCTYPE html>
<html>
<head>
  <title>Manhwa Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
      color: #2b2b2b;
    }

    .header {
      text-align: center;
      padding: 50px 20px;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }

    .header h1 {
      font-size: 40px;
      color: #6b21a8;
      margin: 0;
    }

    .header p {
      font-size: 18px;
      opacity: 0.8;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .intro {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    .cover {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .chapter {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .chapter:hover {
      transform: scale(1.02);
      background: rgba(255, 255, 255, 0.8);
    }

  </style>
</head>

<body>

  <div class="header">
    <h1>🌸 Manhwa Site</h1>
    <p>Welcome sa world ng stories</p>
  </div>

  <div class="container">

    <div class="intro">
      <h2>✨ Intro</h2>
      <p>
        Welcome sa aking Manhwa Site. Dito mo mababasa ang mga chapters ng aking story.
        Enjoy reading! 💜
      </p>
    </div>

    <img class="cover" src="https://via.placeholder.com/900x400" alt="cover">

    <h2>📚 Chapters</h2>

    <div class="chapter">Chapter 1 - Simula</div>
    <div class="chapter">Chapter 2 - Ang Lihim</div>
    <div class="chapter">Chapter 3 - Pagbabago</div>

  </div>

</body>
</html>
