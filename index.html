<!DOCTYPE html>
<html>
<head>
  <title>PL Manhwa Free Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #eff6ff);
      color: #1f2937;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 80px 20px;
      background: url('https://images.unsplash.com/photo-1520763185298-1b434c919102?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
      color: white;
    }

    .header::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(59,130,246,0.6);
    }

    .header-content {
      position: relative;
      z-index: 1;
    }

    .header h1 {
      font-size: 60px;
      margin: 0;
    }

    .header p {
      font-size: 18px;
      margin-top: 10px;
    }

    /* INTRO */
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .intro {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-top: -30px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 40px;
      color: #2563eb;
    }

    /* HORIZONTAL LIST */
    .scroll {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .card {
      min-width: 200px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      flex-shrink: 0;
      position: relative;
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px;
      font-size: 16px;
    }

    .desc {
      margin: 0 10px 10px;
      font-size: 12px;
      color: #6b7280;
    }

    .tag {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #22c55e;
      color: white;
      font-size: 10px;
      padding: 4px 6px;
      border-radius: 6px;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-content">
      <h1>PL MANHWA FREE SITE</h1>
      <p>Read Manhwa for Free Anytime</p>
    </div>
  </div>

  <div class="container">

    <!-- INTRO -->
    <div class="intro">
      <h2>🌸 Welcome</h2>
      <p>
        Welcome to PL Manhwa Site. You can read your favorite manhwa for free.
        Enjoy completed stories in one place.
      </p>
    </div>

    <!-- MANHWA LIST -->
    <h2>MANHWA COMPLETED LIST 🔥</h2>

      <div class="card">

        <h3>Jinx</h3>
        <p class="desc">Drama • BL • Mature</p>
      </div>

      <div class="card">
        <span class="tag">Completed</span
