<!DOCTYPE html>
<html>
<head>
  <title>My Manhwa Site</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      padding: 0;
    }

    .header {
      text-align: center;
      padding: 30px;
      background: #222;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .cover {
      width: 100%;
      border-radius: 10px;
    }

    .chapter {
      background: #333;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .chapter:hover {
      background: #444;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>🔥 My Manhwa Site</h1>
  <p>Welcome sa story ko</p>
</div>

<div class="container">

  <img class="cover" src="https://via.placeholder.com/800x400" alt="cover">

  <h2>Chapters</h2>

  <div class="chapter">Chapter 1 - Simula</div>
  <div class="chapter">Chapter 2 - Ang Lihim</div>
  <div class="chapter">Chapter 3 - Pagbabago</div>

</div>

</body>
</html>
