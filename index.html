<!DOCTYPE html>
<html>
<head>
  <title>Manhwa Free Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #2b2b2b;

      /* Tulip-style background (free image) */
      background: url('https://images.unsplash.com/photo-1520763185298-1b434c919102?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .overlay {
      background: rgba(255, 255, 255, 0.75);
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .header h1 {
      font-size: 50px;
      color: #7c3aed;
      margin: 0;
      letter-spacing: 2px;
    }

    .header p {
      font-size: 18px;
      margin-top: 10px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .intro {
      background: rgba(255,255,255,0.8);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    .intro h2 {
      margin-top: 0;
      color: #6d28d9;
    }

    /* MANHWA GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
    }

    .card {
      background: rgba(255,255,255,0.85);
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card p {
      margin: 10px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="overlay">

  <div class="header">
    <h1>✨ MANHWA FREE SITE ✨</h1>
    <p>This website you can read a Manhwa for Free</p>
  </div>

  <div class="container">

    <div class="intro">
      <h2>🌸 Welcome</h2>
      <p>
        This website you can read a Manhwa for Free.
        Enjoy exploring different stories and chapters!
      </p>
    </div>

    <h2>📚 Manhwa List</h2>

    <div class="grid">

      <div class="card">
        <img src="https://via.placeholder.com/300x400" alt="manhwa">
        <p>Manhwa Title 1</p>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300x400" alt="manhwa">
        <p>Manhwa Title 2</p>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300x400" alt="manhwa">
        <p>Manhwa Title 3</p>
      </div>

    </div>

  </div>

</div>

</body>
</html>
